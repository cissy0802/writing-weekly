name: Inject Shared Scripts

# After any push that touched HTML, ensure each page includes the shared
# hub scripts (comments.js + search.js). Skips its own bot commits.

on:
  push:
    branches: [main]
    paths: ['**/*.html']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject missing shared script tags
        run: |
          changed=0
          while IFS= read -r f; do
            for script in comments.js search.js; do
              if ! grep -q "$script" "$f"; then
                tag="<script src=\"https://cissy0802.github.io/$script\" defer></script>"
                if grep -qi "</body>" "$f"; then
                  awk -v tag="$tag" 'BEGIN{IGNORECASE=1} /<\/body>/ && !done { print tag; done=1 } { print }' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
                else
                  printf '\n%s\n' "$tag" >> "$f"
                fi
                changed=$((changed+1))
                echo "  + $f ($script)"
              fi
            done
          done < <(find . -name '*.html' -not -path './.git/*' -not -path './node_modules/*')
          echo "Injected $changed tag(s)."

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git add -A
          git commit -m "Auto-inject shared scripts (comments + search)"
          git push
